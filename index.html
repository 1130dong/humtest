<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>흥얼</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  --bg:#0c0c0f; --card:#1a1a22; --sur:#111118; --bdr:rgba(255,255,255,0.07);
  --acc:#7c6af7; --grn:#34d399; --red:#f87171; --amb:#fbbf24;
  --txt:#efeffa; --sub:#6b6b80; --dim:#33334a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--bg);color:var(--txt);
  font-family:'Inter',-apple-system,sans-serif;
  display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;position:fixed;width:100%;
}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 12px;padding-top:max(16px,env(safe-area-inset-top,16px));flex-shrink:0}
.logo{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo em{font-style:normal;color:var(--acc)}
.pill{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;
  background:var(--sur);border:1px solid var(--bdr);color:var(--sub);transition:all .25s}
.pill.r{color:var(--red);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.07)}
.pill.g{color:var(--grn);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.07)}

/* scroll body */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 12px;display:flex;flex-direction:column;gap:10px}

/* note card */
.ncard{background:var(--card);border:1px solid var(--bdr);border-radius:18px;
  padding:16px 16px 12px;flex-shrink:0}
.nrow{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.nbig{width:90px;flex-shrink:0;text-align:center}
.nname{font-size:50px;font-weight:700;line-height:1;letter-spacing:-3px;
  background:linear-gradient(135deg,var(--acc),#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nhz{font-size:10px;color:var(--sub);margin-top:2px;font-weight:500}
.wside{flex:1;min-width:0}
.wlbl{font-size:9px;color:var(--dim);font-weight:600;letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:4px}
#wC{width:100%;height:38px;border-radius:8px;background:var(--sur);display:block}

/* roll card */
.rcard{background:var(--card);border:1px solid var(--bdr);border-radius:18px;
  padding:12px 12px 10px;flex-shrink:0}
.ctitle{font-size:9px;font-weight:600;color:var(--dim);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between}
#rC{width:100%;height:118px;border-radius:10px;background:var(--sur);display:block}

/* saves card */
.scard{background:var(--card);border:1px solid var(--bdr);border-radius:18px;
  padding:12px;flex:1;min-height:80px;display:flex;flex-direction:column;
  overflow:hidden;margin-bottom:10px}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0}
.bsave{font-size:12px;font-weight:600;padding:5px 13px;border-radius:10px;
  border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.07);
  color:var(--amb);cursor:pointer;transition:all .12s;font-family:inherit}
.bsave:active{transform:scale(.94)}
.bsave:disabled{opacity:.25;pointer-events:none}
.slist{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.empty{text-align:center;padding:18px 0;color:var(--dim);font-size:12px}

/* melody row */
.mrow{display:flex;align-items:center;gap:10px;background:var(--sur);
  border:1px solid var(--bdr);border-radius:12px;padding:10px 12px;margin-bottom:7px;transition:all .1s}
.mrow:active{transform:scale(.985)}
.minfo{flex:1;min-width:0}
.mname{font-size:12px;font-weight:600;color:var(--txt);margin-bottom:3px}
.mcanv{width:100%;height:22px;border-radius:4px;display:block;background:var(--card)}
.mmeta{font-size:10px;color:var(--sub);margin-top:2px}
.mbtns{display:flex;gap:5px;flex-shrink:0}
.ib{width:33px;height:33px;border-radius:9px;border:1px solid var(--bdr);
  background:var(--card);color:var(--sub);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .1s}
.ib:active{transform:scale(.86)}
.ib.p:active{background:rgba(124,106,247,.2);color:var(--acc);border-color:rgba(124,106,247,.4)}
.ib.d:active{background:rgba(248,113,113,.15);color:var(--red);border-color:rgba(248,113,113,.4)}

/* bottom */
.bot{flex-shrink:0;background:var(--bg);border-top:1px solid var(--bdr);
  padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
  display:flex;gap:8px;align-items:stretch}
.brec{flex:1;height:52px;border-radius:15px;border:none;
  background:var(--acc);color:#fff;font-family:inherit;
  font-size:15px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  box-shadow:0 2px 16px rgba(124,106,247,.3);transition:all .12s}
.brec:active{transform:scale(.97)}
.brec.on{background:var(--red);box-shadow:0 2px 16px rgba(248,113,113,.35);
  animation:rp 1.4s ease-in-out infinite}
@keyframes rp{0%,100%{box-shadow:0 2px 16px rgba(248,113,113,.35)}
  50%{box-shadow:0 2px 28px rgba(248,113,113,.6)}}
.rbts{display:flex;flex-direction:column;gap:6px}
.bm{width:58px;flex:1;border-radius:10px;border:1px solid var(--bdr);
  background:var(--sur);color:var(--sub);font-size:11px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:3px;transition:all .1s;font-family:inherit;white-space:nowrap}
.bm:active{transform:scale(.91)}
.bm.play{color:var(--grn);border-color:rgba(52,211,153,.25);background:rgba(52,211,153,.06)}
.bm:disabled{opacity:.22;pointer-events:none}
.rdot{width:8px;height:8px;border-radius:50%;background:#fff;flex-shrink:0;
  animation:rb 1s infinite}
@keyframes rb{0%,100%{opacity:1}50%{opacity:.1}}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">흥얼<em>.</em></div>
  <div class="pill" id="pill">대기 중</div>
</div>

<div class="body">
  <div class="ncard">
    <div class="nrow">
      <div class="nbig">
        <div class="nname" id="nname">—</div>
        <div class="nhz" id="nhz">마이크 허용 후 시작</div>
      </div>
      <div class="wside">
        <div class="wlbl">파형</div>
        <canvas id="wC"></canvas>
      </div>
    </div>
  </div>

  <div class="rcard">
    <div class="ctitle">
      <span>멜로디 롤</span>
      <span style="color:rgba(124,106,247,.45)">← 과거 · 현재 →</span>
    </div>
    <canvas id="rC"></canvas>
  </div>

  <div class="scard">
    <div class="shdr">
      <div class="ctitle" style="margin:0">저장된 멜로디</div>
      <button class="bsave" id="saveBtn" onclick="doSave()" disabled>저장</button>
    </div>
    <div class="slist" id="slist">
      <div class="empty">아직 저장된 멜로디가 없어요</div>
    </div>
  </div>
</div>

<div class="bot">
  <button class="brec" id="recBtn" onclick="toggleRec()">
    <span style="font-size:16px">🎤</span> 녹음 시작
  </button>
  <div class="rbts">
    <button class="bm play" id="playBtn" onclick="doPlay(null)" disabled>▶ 재생</button>
    <button class="bm" id="clrBtn" onclick="doClear()" disabled>✕ 지우기</button>
  </div>
</div>

<script>
/* ── constants ── */
const NNAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NCOLORS = {
  C:'#8b5cf6','C#':'#7c3aed',D:'#6366f1','D#':'#3b82f6',
  E:'#06b6d4',F:'#10b981','F#':'#22c55e',G:'#eab308',
  'G#':'#f59e0b',A:'#ef4444','A#':'#ec4899',B:'#a855f7'
};
const MMIN=48, MMAX=84, MRANGE=MMAX-MMIN;

/* ── state ── */
let micSt=null, recCtx=null, anal=null;
let isRec=false;
// each note: { midi, t, dur }   (t = start time in seconds from recording start)
let notes=[];
let livePts=[];   // { midi, px }
let rollPx=0;
let raf=null;
let curMidi=-1, noteOnAt=null, noteTimeAcc=0;
let saves=[];
try{saves=JSON.parse(localStorage.getItem('hm3')||'[]')}catch(e){}

/* ── canvas ── */
const wC=document.getElementById('wC'), wX=wC.getContext('2d');
const rC=document.getElementById('rC'), rX=rC.getContext('2d');
const DPR=Math.min(devicePixelRatio||1,3);

function resize(){
  [wC,rC].forEach(c=>{
    const r=c.getBoundingClientRect();
    if(!r.width)return;
    c.width=r.width*DPR; c.height=r.height*DPR;
    c.getContext('2d').scale(DPR,DPR);
  });
}
window.addEventListener('resize',()=>setTimeout(resize,80));
setTimeout(resize,200);

/* ── pitch (autocorrelation) ── */
function pitch(buf,sr){
  const N=buf.length,H=N>>1;
  let rms=0; for(let i=0;i<N;i++) rms+=buf[i]*buf[i];
  if(Math.sqrt(rms/N)<0.013) return -1;
  let best=-1,bv=0,prev=1,up=false;
  for(let t=1;t<H;t++){
    let s=0,d=0;
    for(let i=0;i<H;i++){s+=buf[i]*buf[i+t];d+=buf[i]*buf[i]+buf[i+t]*buf[i+t];}
    const v=d<1e-10?0:2*s/d;
    if(!up&&v>0)up=true;
    if(up&&v>0.86&&v>=prev){best=t;bv=v;}
    else if(up&&v<prev&&best>0)break;
    prev=v;
  }
  return(best<2||bv<0.86)?-1:sr/best;
}
function f2m(f){return Math.round(12*Math.log2(f/440)+69);}
function m2hz(m){return 440*Math.pow(2,(m-69)/12);}
function m2n(m){return NNAMES[m%12]+(Math.floor(m/12)-1);}
function nY(m,h){return h-((m-MMIN)/MRANGE)*h*.86-h*.07;}
function nC(m){return NCOLORS[NNAMES[m%12]];}

/* ── record ── */
async function toggleRec(){if(!isRec)await startRec();else stopRec();}

async function startRec(){
  try{
    micSt=await navigator.mediaDevices.getUserMedia(
      {audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
    recCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(recCtx.state==='suspended')await recCtx.resume();
    anal=recCtx.createAnalyser();
    anal.fftSize=8192; anal.smoothingTimeConstant=0.15;
    recCtx.createMediaStreamSource(micSt).connect(anal);
    isRec=true; notes=[]; livePts=[]; rollPx=0;
    curMidi=-1; noteOnAt=null; noteTimeAcc=0;
    setPill('● REC','r'); setRecBtn(true);
    document.getElementById('playBtn').disabled=true;
    document.getElementById('clrBtn').disabled=true;
    document.getElementById('saveBtn').disabled=true;
    loopRec();
  }catch(e){setPill('마이크 필요','');}
}

function stopRec(){
  isRec=false;
  if(micSt)micSt.getTracks().forEach(t=>t.stop());
  if(recCtx)recCtx.close();
  cancelAnimationFrame(raf);
  // flush last note
  if(curMidi>0&&noteOnAt!==null){
    const dur=(performance.now()-noteOnAt)/1000;
    if(dur>0.07)notes.push({midi:curMidi,t:noteTimeAcc,dur:dur});
  }
  setRecBtn(false);
  const has=notes.length>0;
  setPill(has?notes.length+'음 인식됨':'다시 시도',has?'g':'');
  document.getElementById('nname').textContent='—';
  document.getElementById('nhz').textContent=has?'녹음 완료':'소리를 못 잡았어요';
  document.getElementById('playBtn').disabled=!has;
  document.getElementById('clrBtn').disabled=!has;
  document.getElementById('saveBtn').disabled=!has;
  if(has)drawFinal();
}

/* ── record loop ── */
function loopRec(){
  raf=requestAnimationFrame(loopRec);
  const buf=new Float32Array(anal.fftSize);
  anal.getFloatTimeDomainData(buf);
  drawWave(buf);
  const hz=pitch(buf,recCtx.sampleRate);
  const now=performance.now();
  if(hz>55&&hz<2100){
    const m=f2m(hz);
    if(m>=MMIN&&m<=MMAX){
      setNote(m,hz);
      if(m!==curMidi){
        if(curMidi>0&&noteOnAt!==null){
          const d=(now-noteOnAt)/1000;
          if(d>0.07){notes.push({midi:curMidi,t:noteTimeAcc,dur:d});noteTimeAcc+=d;}
        }
        curMidi=m; noteOnAt=now;
      }
      livePts.push({midi:m,px:rollPx});
    }
  }else{
    if(curMidi>0&&noteOnAt!==null){
      const d=(now-noteOnAt)/1000;
      if(d>0.07){notes.push({midi:curMidi,t:noteTimeAcc,dur:d});noteTimeAcc+=d;}
      curMidi=-1; noteOnAt=null;
    }
    clearNote();
  }
  rollPx+=1.4; drawLive();
}

/* ── draw ── */
function setNote(m,hz){
  const el=document.getElementById('nname');
  el.textContent=m2n(m);
  const c=nC(m);
  el.style.background=`linear-gradient(135deg,${c},#a78bfa)`;
  el.style.webkitBackgroundClip='text';el.style.backgroundClip='text';el.style.webkitTextFillColor='transparent';
  document.getElementById('nhz').textContent=hz.toFixed(0)+' Hz';
}
function clearNote(){
  const el=document.getElementById('nname');
  el.textContent='—';
  el.style.background='linear-gradient(135deg,var(--acc),#a78bfa)';
  el.style.webkitBackgroundClip='text';el.style.backgroundClip='text';el.style.webkitTextFillColor='transparent';
  document.getElementById('nhz').textContent='감지 중...';
}
function drawWave(buf){
  const w=wC.getBoundingClientRect().width,h=wC.getBoundingClientRect().height;
  wX.clearRect(0,0,w,h);
  wX.beginPath();
  const s=buf.length/w;
  for(let i=0;i<w;i++){const y=h/2+buf[Math.floor(i*s)]*h*.42;i===0?wX.moveTo(i,y):wX.lineTo(i,y);}
  wX.strokeStyle='rgba(124,106,247,.8)';wX.lineWidth=1.5;
  wX.shadowColor='rgba(124,106,247,.4)';wX.shadowBlur=5;
  wX.stroke();wX.shadowBlur=0;
}
function drawGrid(w,h){
  for(let n=MMIN;n<=MMAX;n++){
    if(NNAMES[n%12]==='C'){
      const y=nY(n,h);
      rX.beginPath();rX.moveTo(0,y);rX.lineTo(w,y);
      rX.strokeStyle='rgba(255,255,255,.05)';rX.lineWidth=1;rX.stroke();
      rX.fillStyle='rgba(255,255,255,.18)';rX.font='8px Inter,sans-serif';
      rX.fillText(m2n(n),3,y-2);
    }
  }
}
function drawLive(){
  const w=rC.getBoundingClientRect().width,h=rC.getBoundingClientRect().height;
  rX.clearRect(0,0,w,h);drawGrid(w,h);
  const cut=rollPx-w; livePts=livePts.filter(p=>p.px>=cut);
  if(livePts.length<2)return;
  rX.beginPath();
  livePts.forEach((p,i)=>{const x=p.px-cut,y=nY(p.midi,h);i===0?rX.moveTo(x,y):rX.lineTo(x,y);});
  rX.strokeStyle='rgba(124,106,247,.7)';rX.lineWidth=2.5;
  rX.lineCap='round';rX.lineJoin='round';
  rX.shadowColor='rgba(124,106,247,.5)';rX.shadowBlur=7;
  rX.stroke();rX.shadowBlur=0;
  const l=livePts[livePts.length-1];
  const lx=l.px-cut,ly=nY(l.midi,h),lc=nC(l.midi);
  rX.beginPath();rX.arc(lx,ly,4.5,0,Math.PI*2);
  rX.fillStyle=lc;rX.shadowColor=lc;rX.shadowBlur=12;rX.fill();rX.shadowBlur=0;
}
function drawFinal(){
  const w=rC.getBoundingClientRect().width,h=rC.getBoundingClientRect().height;
  rX.clearRect(0,0,w,h);drawGrid(w,h);
  if(!notes.length)return;
  const tot=notes[notes.length-1].t+notes[notes.length-1].dur;
  if(tot<=0)return;
  notes.forEach(n=>{
    const x=(n.t/tot)*(w-8)+4, bw=Math.max(4,(n.dur/tot)*(w-8));
    const y=nY(n.midi,h),c=nC(n.midi);
    rX.fillStyle=c;rX.shadowColor=c;rX.shadowBlur=5;
    rX.beginPath();rX.roundRect(x,y-4,bw,8,3);rX.fill();rX.shadowBlur=0;
    if(bw>20){rX.fillStyle='rgba(255,255,255,.85)';rX.font='bold 7px Inter,sans-serif';rX.fillText(m2n(n.midi),x+2,y+2.5);}
  });
}

/* ── PLAYBACK ──────────────────────────────────────────────────────────────
   Key fixes:
   1. Always new AudioContext per play (never reuse closed one)
   2. Properly separate connect calls (no chaining)
   3. Always resume before scheduling
   4. Use ctx.currentTime AFTER resume
───────────────────────────────────────────────────────────────────────── */
function doPlay(arr){
  const list=arr||notes;
  if(!list||!list.length)return;

  const ctx=new(window.AudioContext||window.webkitAudioContext)();

  function scheduleAll(){
    const t0=ctx.currentTime+0.1;  // 100ms ahead — important for mobile
    let last=0;

    list.forEach(function(n){
      const dur=Math.max(0.15, n.dur);
      const hz=m2hz(n.midi);
      const tStart=t0+n.t;
      const tEnd=tStart+dur;

      const osc=ctx.createOscillator();
      const gain=ctx.createGain();

      // connect separately — no chaining
      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.type='sine';
      osc.frequency.value=hz;

      // envelope: attack → sustain → release
      gain.gain.cancelScheduledValues(tStart);
      gain.gain.setValueAtTime(0.0001, tStart);
      gain.gain.linearRampToValueAtTime(0.4, tStart+0.03);
      gain.gain.setValueAtTime(0.4, tEnd-0.05);
      gain.gain.linearRampToValueAtTime(0.0001, tEnd);

      osc.start(tStart);
      osc.stop(tEnd+0.01);

      if(tEnd-t0>last) last=tEnd-t0;
    });

    // restore play button
    const btn=document.getElementById('playBtn');
    btn.disabled=true; btn.textContent='♪ 재생중';
    setTimeout(function(){
      btn.textContent='▶ 재생';
      btn.disabled=!(notes.length>0);
      ctx.close();
    }, last*1000+700);
  }

  if(ctx.state==='suspended'){
    ctx.resume().then(scheduleAll);
  } else {
    scheduleAll();
  }
}

/* ── save / delete ── */
function doSave(){
  if(!notes.length)return;
  saves.unshift({id:Date.now(),name:'멜로디 '+(saves.length+1),notes:JSON.parse(JSON.stringify(notes)),at:new Date().toLocaleString('ko-KR')});
  try{localStorage.setItem('hm3',JSON.stringify(saves));}catch(e){}
  renderSaves(); setPill('저장됨 ✓','g');
}
function delSave(id){
  saves=saves.filter(s=>s.id!==id);
  try{localStorage.setItem('hm3',JSON.stringify(saves));}catch(e){}
  renderSaves();
}
function renderSaves(){
  const el=document.getElementById('slist');
  if(!saves.length){el.innerHTML='<div class="empty">아직 저장된 멜로디가 없어요</div>';return;}
  el.innerHTML=saves.map(s=>`
    <div class="mrow">
      <div class="minfo">
        <div class="mname">${s.name}</div>
        <canvas class="mcanv" id="mc${s.id}" width="200" height="22"></canvas>
        <div class="mmeta">${s.notes.length}개 음 · ${s.at}</div>
      </div>
      <div class="mbtns">
        <button class="ib p" onclick="doPlay(saves.find(x=>x.id===${s.id}).notes)">▶</button>
        <button class="ib d" onclick="delSave(${s.id})">✕</button>
      </div>
    </div>`).join('');
  saves.forEach(s=>setTimeout(()=>drawMini(s),50));
}
function drawMini(s){
  const c=document.getElementById('mc'+s.id);
  if(!c)return;
  const cx=c.getContext('2d'),w=c.width,h=c.height;
  cx.clearRect(0,0,w,h);
  const a=s.notes; if(!a.length)return;
  const tot=a[a.length-1].t+a[a.length-1].dur; if(tot<=0)return;
  a.forEach(n=>{
    const x=(n.t/tot)*(w-4)+2,bw=Math.max(2,(n.dur/tot)*(w-4));
    const y=nY(n.midi,h);
    cx.fillStyle=nC(n.midi);
    cx.beginPath();cx.roundRect(x,y-2,bw,4,1.5);cx.fill();
  });
}

/* ── clear ── */
function doClear(){
  notes=[];livePts=[];rollPx=0;
  const rr=rC.getBoundingClientRect(),wr=wC.getBoundingClientRect();
  rX.clearRect(0,0,rr.width,rr.height);
  wX.clearRect(0,0,wr.width,wr.height);
  document.getElementById('nname').textContent='—';
  document.getElementById('nhz').textContent='마이크 허용 후 시작';
  document.getElementById('playBtn').disabled=true;
  document.getElementById('clrBtn').disabled=true;
  document.getElementById('saveBtn').disabled=true;
  setPill('대기 중','');
}

/* ── helpers ── */
function setPill(t,c){const e=document.getElementById('pill');e.textContent=t;e.className='pill'+(c?' '+c:'');}
function setRecBtn(on){
  const b=document.getElementById('recBtn');
  b.innerHTML=on?'<span class="rdot"></span> 녹음 중지':'<span style="font-size:16px">🎤</span> 녹음 시작';
  on?b.classList.add('on'):b.classList.remove('on');
}

renderSaves();
setTimeout(resize,350);
</script>
</body>
</html>
